version: '3.9'
services:
  db:
    image: postgres:15-alpine
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ← исправлено: volume подключён

  backend:
    build: ../
    env_file: ../.env
    depends_on: [db]
    volumes:
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:alpine
    ports: ['80:80']
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on: [backend]

volumes:
  postgres_data:
  static_volume:
